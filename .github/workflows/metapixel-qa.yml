name: metapixel-qa

# Root cause of the previous red CI: this workflow was copied from the private
# monorepo, where the plugin lived under a nested plugin sub-path with a shared
# vendor tree at the repo root. On the PUBLIC origin the plugin IS the repo root
# (composer.json, phpstan.neon, phpunit.xml all at top level), so the old nested
# working directory and repo-root-relative pest binary paths never existed and
# every cell failed in ~21s.
#
# Fix: reconstruct a host OctoberCMS app in the runner and mount the checked-out
# plugin under that app's plugins tree so the plugin phpunit.xml bootstrap and the
# host modules + vendor resolve exactly as they do in a real operator install.

on:
  push:
    branches: [master]
  pull_request:

# Least-privilege: this is a read-only QA gate. Override the default GITHUB_TOKEN
# scope so a compromised step cannot push refs, create releases, or tags.
permissions:
  contents: read

jobs:
  qa:
    name: composer qa (PHP ${{ matrix.php }} / ${{ matrix.install }})
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4']
        install: [full-lovata, minimal]

    env:
      OCTOBER_APP_DIR: ${{ github.workspace }}/october-host
      PLUGIN_DIR: ${{ github.workspace }}/october-host/plugins/logingrupa/metapixel
      # Location-independent gateway credential. Composer reads COMPOSER_AUTH for
      # every command regardless of where COMPOSER_HOME resolves (the runner uses
      # the XDG path $HOME/.config/composer, not $HOME/.composer), so this avoids
      # the wrong-auth-path 403 that made gateway packages look "not found".
      COMPOSER_AUTH: ${{ secrets.OCTOBER_AUTH_JSON }}

    steps:
      - name: Checkout plugin (standalone repo — the plugin IS the repo root)
        uses: actions/checkout@v4
        with:
          path: plugin-src

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer
          coverage: xdebug
          extensions: dom, json, libxml, mbstring, pdo, pdo_sqlite, sqlite3, intl, fileinfo, gd, zip, curl

      - name: Configure October gateway (credential + repository)
        run: |
          # october/system and every lovata/* backbone package resolve ONLY through
          # the authenticated October gateway — there is no public Packagist path.
          # COMPOSER_AUTH (set at job level from the secret) supplies the credential
          # for every composer command, location-independent. Fail fast if absent.
          if [ -z "$COMPOSER_AUTH" ]; then
            echo "::error title=Missing OCTOBER_AUTH_JSON::october/system and lovata/* install only via authenticated gateway.octobercms.com. Add the OCTOBER_AUTH_JSON repository secret under Settings -> Secrets and variables -> Actions, containing your October auth.json contents."
            exit 1
          fi
          # Validate the secret is well-formed JSON before any composer step consumes it.
          php -r '$s = getenv("COMPOSER_AUTH"); json_decode($s); if (json_last_error() !== JSON_ERROR_NONE) { fwrite(STDERR, "OCTOBER_AUTH_JSON is not valid JSON: " . json_last_error_msg() . PHP_EOL); exit(1); }'
          # A fresh October project has NO gateway repository entry (php artisan
          # project:set adds it interactively from the license, unavailable in CI).
          # The credential alone does not declare WHERE to look, so lovata/* stay
          # invisible to the resolver. Register the gateway globally so it applies to
          # both the host-app require AND the plugin-dir dev-toolchain install (the
          # plugin's own composer.json declares no repositories, like any marketplace
          # plugin). Mirrors the monorepo composer.json octobercms repository.
          composer config --global repositories.octobercms composer https://gateway.octobercms.com
          # Composer 2.2+ blocks installer plugins unless allow-listed, and errors
          # (instead of prompting) in non-interactive CI. Allow the same set the
          # monorepo composer.json permits, globally — this governs the plugin-dir
          # install, whose composer.json declares no allow-plugins of its own.
          for P in composer/installers php-http/discovery pestphp/pest-plugin cweagans/composer-patches; do
            composer config --global "allow-plugins.$P" true
          done

      - name: Create host OctoberCMS 4.x app
        run: composer create-project october/october "$OCTOBER_APP_DIR" "^4.0" --no-interaction --no-progress --prefer-dist

      - name: Allow required composer plugins in the host app
        working-directory: ${{ env.OCTOBER_APP_DIR }}
        run: |
          # The host app's own composer.json config.allow-plugins takes precedence
          # over the global default, so allow-list the required plugins here too for
          # the lovata/* require step below (idempotent if the skeleton already has them).
          for P in composer/installers php-http/discovery pestphp/pest-plugin cweagans/composer-patches; do
            composer config "allow-plugins.$P" true
          done

      - name: Mount the checked-out plugin into the host app
        run: |
          mkdir -p "$PLUGIN_DIR"
          rsync -a --delete \
            --exclude '.git' \
            --exclude 'vendor' \
            --exclude 'node_modules' \
            plugin-src/ "$PLUGIN_DIR/"

      - name: Require Lovata backbone + cart plugins (full-lovata cell)
        if: matrix.install == 'full-lovata'
        working-directory: ${{ env.OCTOBER_APP_DIR }}
        run: |
          composer require --no-interaction --no-progress --with-all-dependencies \
            lovata/toolbox-plugin:^2.2 \
            lovata/shopaholic-plugin:^1.32 \
            lovata/ordersshopaholic-plugin:^1.33 \
            lovata/buddies-plugin:^1.10

      - name: Require Lovata backbone only (minimal cell — no cart plugins)
        if: matrix.install == 'minimal'
        working-directory: ${{ env.OCTOBER_APP_DIR }}
        run: |
          # Mirrors a marketplace install where the operator has NOT installed the
          # Lovata cart plugins. Only the mandatory Toolbox backbone is present.
          composer require --no-interaction --no-progress --with-all-dependencies \
            lovata/toolbox-plugin:^2.2

      - name: Install plugin dev toolchain (full-lovata cell)
        if: matrix.install == 'full-lovata'
        working-directory: ${{ env.PLUGIN_DIR }}
        run: |
          # DISABLE October's composer/installers for the plugin-dir install so
          # october/system + lovata/* stay under vendor/ (which pint/php-cs-fixer
          # auto-excludes) instead of being relocated into plugins/ + modules/, where
          # the qa tools would otherwise lint/analyse third-party October code.
          # The functional October runtime for the pest bootstrap comes from the HOST
          # app (installers enabled there); here vendor/ only needs to autoload.
          composer config allow-plugins.composer/installers false
          composer config allow-plugins.php-http/discovery true
          composer config allow-plugins.pestphp/pest-plugin true
          composer config allow-plugins.cweagans/composer-patches true
          composer install --no-interaction --no-progress --prefer-dist

      - name: Install plugin dev toolchain (minimal cell — strip cart plugins from require-dev)
        if: matrix.install == 'minimal'
        working-directory: ${{ env.PLUGIN_DIR }}
        run: |
          # Keep october/* + lovata/* under vendor/ (pint-excluded) — see full-lovata cell.
          composer config allow-plugins.composer/installers false
          composer config allow-plugins.php-http/discovery true
          composer config allow-plugins.pestphp/pest-plugin true
          composer config allow-plugins.cweagans/composer-patches true
          # Strip the Lovata cart packages from the plugin's require-dev so the
          # adapter-coupled dependencies are absent, mirroring the minimal operator.
          composer remove --dev --no-update --no-interaction \
            lovata/shopaholic-plugin \
            lovata/ordersshopaholic-plugin \
            lovata/buddies-plugin || true
          composer install --no-interaction --no-progress --prefer-dist

      - name: composer qa — full Lovata (Run A, coverage gate >= 90%)
        if: matrix.install == 'full-lovata'
        working-directory: ${{ env.PLUGIN_DIR }}
        run: |
          composer run-script pint-test
          composer run-script analyse
          composer run-script phpmd
          composer run-script deps
          # Pest bootstraps through the mounted host app (phpunit.xml ->
          # ../../../modules/system/tests/bootstrap.php). Coverage gate on this cell only.
          "$PLUGIN_DIR/vendor/bin/pest" --configuration phpunit.xml --coverage --min=90

      - name: composer qa — minimal (Run B, exclude adapter group, no coverage gate)
        if: matrix.install == 'minimal'
        working-directory: ${{ env.PLUGIN_DIR }}
        run: |
          composer run-script pint-test
          composer run-script analyse
          composer run-script phpmd
          composer run-script deps
          # Adapter tests pull in Lovata cart classes absent from the minimal cell;
          # exclude them via the Phase 3 #[Group('adapter')] attribute.
          "$PLUGIN_DIR/vendor/bin/pest" --configuration phpunit.xml --exclude-group=adapter
