# Logingrupa.Metapixelshopaholic — backend Settings field definitions.
#
# 10 SKEL-02 fields organised across 3 tabs (Tracking / Compliance / Advanced).
# `paid_status_code` + `queue_connection` populate from Settings::getXxxOptions()
# (auto-invoked by October's form builder via the `options:` key).
# Labels resolve via lang keys in lang/{en,lv,ru}/lang.php under `field.*`.
#
# Per-key label/commentAbove invariant is locked by
# tests/Feature/SettingsRegistrationTest::test_fields_yaml_binds_lang_keys_per_field.

tabs:
    fields:
        # T-04-01 mitigation: pixel_id must be a 6-20 digit numeric
        # Meta-issued ID. Prevents <script> string break-out via stored
        # XSS in components/pixelhead/default.htm AND
        # components/purchasepixel/default.htm where the pixel_id is
        # inlined as a JS string literal. Hard enforcement is in
        # Settings.php::$rules; this YAML attribute is a backend UI hint
        # (October's form builder reads `pattern:` for client-side validation).
        pixel_id:
            label: 'logingrupa.metapixelshopaholic::lang.field.pixel_id'
            commentAbove: 'logingrupa.metapixelshopaholic::lang.field.pixel_id_comment'
            tab: 'logingrupa.metapixelshopaholic::lang.tab.tracking'
            type: text
            span: left
            required: true
            translatable: true
            pattern: '^\d{6,20}$'

        capi_access_token:
            label: 'logingrupa.metapixelshopaholic::lang.field.capi_access_token'
            commentAbove: 'logingrupa.metapixelshopaholic::lang.field.capi_access_token_comment'
            tab: 'logingrupa.metapixelshopaholic::lang.tab.tracking'
            type: password
            span: right
            required: true

        test_event_code:
            label: 'logingrupa.metapixelshopaholic::lang.field.test_event_code'
            commentAbove: 'logingrupa.metapixelshopaholic::lang.field.test_event_code_comment'
            tab: 'logingrupa.metapixelshopaholic::lang.tab.tracking'
            type: text
            span: left

        currency_code:
            label: 'logingrupa.metapixelshopaholic::lang.field.currency_code'
            commentAbove: 'logingrupa.metapixelshopaholic::lang.field.currency_code_comment'
            tab: 'logingrupa.metapixelshopaholic::lang.tab.tracking'
            type: text
            span: right
            default: EUR

        phone_country_code:
            label: 'logingrupa.metapixelshopaholic::lang.field.phone_country_code'
            commentAbove: 'logingrupa.metapixelshopaholic::lang.field.phone_country_code_comment'
            tab: 'logingrupa.metapixelshopaholic::lang.tab.compliance'
            type: text
            span: left
            default: '371'

        send_hashed_pii:
            label: 'logingrupa.metapixelshopaholic::lang.field.send_hashed_pii'
            commentAbove: 'logingrupa.metapixelshopaholic::lang.field.send_hashed_pii_comment'
            tab: 'logingrupa.metapixelshopaholic::lang.tab.compliance'
            type: switch
            span: right
            default: true

        ensure_fbp_fbc_server_side:
            label: 'logingrupa.metapixelshopaholic::lang.field.ensure_fbp_fbc_server_side'
            commentAbove: 'logingrupa.metapixelshopaholic::lang.field.ensure_fbp_fbc_server_side_comment'
            tab: 'logingrupa.metapixelshopaholic::lang.tab.compliance'
            type: switch
            span: left
            default: true

        queue_connection:
            label: 'logingrupa.metapixelshopaholic::lang.field.queue_connection'
            commentAbove: 'logingrupa.metapixelshopaholic::lang.field.queue_connection_comment'
            tab: 'logingrupa.metapixelshopaholic::lang.tab.advanced'
            type: dropdown
            span: left
            default: database
            options: getQueueConnectionOptions

        paid_status_code:
            label: 'logingrupa.metapixelshopaholic::lang.field.paid_status_code'
            commentAbove: 'logingrupa.metapixelshopaholic::lang.field.paid_status_code_comment'
            tab: 'logingrupa.metapixelshopaholic::lang.tab.advanced'
            type: dropdown
            span: right
            default: new-payment-received
            options: getPaidStatusCodeOptions
            emptyOption: 'lovata.toolbox::lang.field.empty'

        refire_purchase_on_status_flip:
            label: 'logingrupa.metapixelshopaholic::lang.field.refire_purchase_on_status_flip'
            commentAbove: 'logingrupa.metapixelshopaholic::lang.field.refire_purchase_on_status_flip_comment'
            tab: 'logingrupa.metapixelshopaholic::lang.tab.advanced'
            type: switch
            span: left
            default: false

        cost_price_type_id:
            label: 'logingrupa.metapixelshopaholic::lang.field.cost_price_type_id'
            commentAbove: 'logingrupa.metapixelshopaholic::lang.field.cost_price_type_id_comment'
            tab: 'logingrupa.metapixelshopaholic::lang.tab.advanced'
            type: dropdown
            span: right
            default: 0
            options: getCostPriceTypeIdOptions
            emptyOption: 'lovata.toolbox::lang.field.empty'

        cost_price_excludes_vat:
            label: 'logingrupa.metapixelshopaholic::lang.field.cost_price_excludes_vat'
            commentAbove: 'logingrupa.metapixelshopaholic::lang.field.cost_price_excludes_vat_comment'
            tab: 'logingrupa.metapixelshopaholic::lang.tab.advanced'
            type: switch
            span: left
            default: true
