{# @var sMetaPixelId string #}
{# @var arMetaEvent  array{event_id: string, event_time: int, event_name: string, custom_data: array} #}

{#
    CR-05 lock: every interpolation inside the <script> block uses Twig's
    `e('js')` escaper. Twig's default escaper is HTML — which does NOT escape
    `'`, `"`, or `\` for a JS-context literal. In Phase 2 every input is
    internally sourced and known-safe (`event_name='PageView'` hardcoded in
    PixelHead::onRun, `event_id` is a UUIDv4, `event_time` is `time()`), so
    the extra escaping is a no-op today. Phase 4 FUN-01 will accept user-
    driven `event_name` overrides — the moment that lands without JS-context
    escaping we ship a stored-XSS sink. The `|json_encode|raw` chain for
    `custom_data` is correct: json_encode already produces a safe JS literal.

    The <noscript><img> fallback uses `|url_encode` because attribute-context
    HTML escaping does not URL-encode `&`, `?`, etc. that would otherwise
    break URL structure or smuggle additional query parameters.
#}
{% if sMetaPixelId is not empty and arMetaEvent is not empty %}
<!-- Metapixel — server-side eventID injection -->
<script>
    !function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(window,document,'script','https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', '{{ sMetaPixelId|e('js') }}');
    fbq('track', '{{ arMetaEvent.event_name|e('js') }}', Object.assign({event_time: {{ arMetaEvent.event_time|e('js') }}}, {{ arMetaEvent.custom_data|json_encode|raw }}), {eventID: '{{ arMetaEvent.event_id|e('js') }}'});
</script>
<noscript><img height="1" width="1" style="display:none" src="https://www.facebook.com/tr?id={{ sMetaPixelId|url_encode }}&ev={{ arMetaEvent.event_name|url_encode }}&noscript=1"/></noscript>
{% endif %}
